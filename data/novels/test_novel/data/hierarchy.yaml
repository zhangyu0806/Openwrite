story_info:
  title: 公司里的术师
  theme: 职场与修炼的荒诞平衡
  summary: '《公司里的术师》讲的是一个被加班、故障工单和绩效压力困住的普通程序员，如何在现代互联网公司的日常秩序里意外撞见异常术式，并被迫一边保住饭碗、一边学会修炼和自保的故事。陈明最开始并没有什么“成为英雄”的野心，他只想解释自己为什么越来越清醒、为什么能看见不该存在的符文和逻辑裂缝，以及为什么这些异常总是先出现在会议室、机房、值班系统和祖传代码最密集的地方。

    这本书的推进方式也不会是立刻升级打怪，而是让职场秩序、项目压力、同事关系和隐秘修炼长期绞在一起。随着赵磊、林月、王大伟、徐墨等人逐步卷入，陈明会从一个只想掩盖异常的社畜，慢慢走到不得不主动介入公司暗流、城市级失控事件和更大异常体系的局面里。公司表面上只是普通互联网企业，底下却埋着一整套与旧日志、地下机房和秘密节点相关的历史，这也是整本书长线真正要追索的东西。'
  world_premise: 现代都市里潜伏着只能被少数人察觉的异常
arcs:
- id: arc_001
  title: 第一篇：觉醒与自保
  sections:
