work_constraints = ["标题: 基础设定\n摘要: 全书核心概念、叙事主线、多维度目标\n标签: 故事、核心概念、主线、飞升\n细节索引: 核心前提、限制、禁忌\n## 全书核心命题\n\n> **故事核心：一个穿越者在注定要完的世界线里，硬撑出另一条可能。**\n\n《幕间编修者》是一个关于**在废墟中寻找希望、在多重身份中守护文明、在不可逆的历史中争取改变**的故事。\n\n---\n\n## 多维目标（三线并行）\n\n### 线A：复苏与压制之路\n\n**目标**：逐步复苏值得存续的旧神与文明遗产，同时压制会毁灭世界的邪性力量、极端路线与敌对势力。\n\n- **复苏对象**：值得站在这一边的神灵、旧制度守护者、有价值的文明遗产\n- **压制对象**：负位神性、终末推动者、邪化投影、错误复苏体\n- **核心矛盾**：不是所有的旧神都值得复苏，不是所有的新势力都该被消灭\n\n### 线B：四名位的成长之路\n\n**目标**：以四个身份分别切入不同道途与圈层，积累承认与影响，最终走向飞升。\n\n- **命炉位**：从底层搏杀中积累生存印记\n- **契律位**：在秩序与法统中建立规则接口\n- **构装位**：借助工业与兵装体系成长\n- **叙演位**：在万戏之梦下争夺叙事权\n\n**终点**：不是简单的\"变强\"，而是成为能够承载\"希望\"神性的存在。\n\n### 线C：校勘历史改变世界\n\n**目标**：通过回响校勘改变关键变量，逐步把世界从毁灭线拉...", "标题: 世界规则\n摘要: 世界观核心规则汇总\n标签: 世界观、规则\n细节索引: power_rules、social_rules、limits\n## 一、双界结构\n\n### 现实之形 vs 灵界之义\n\n- **现实之形**：能被物质、距离、能量和工程约束锁定的外在存在\n- **灵界之义**：某一存在在灵界中被梦、叙事、信仰和集体记忆承认的意义结构\n\n### 灵界三层\n\n| 层级 | 名称 | 特征 | 对应修行 |\n|------|------|------|----------|\n| 近岸 | 梦潮带 | 最接近现实梦境与短期情绪 | 点火、低位铭印 |\n| 中层 | 叙信海 | 角色、信仰、社会叙事 | 深位铭印、授箓、显相 |\n| 深层 | 本相渊 | 古老原型、神性生物 | 开域、留痕、飞升 |\n\n---\n\n## 二、折熵天梯\n\n来自第零文明——折熵文明的超早期飞升遗产，把\"无序毁灭\"改造成了\"有序试炼\"。\n\n### 四个功能\n\n- **折叠**：把随机熵灾整理成可识别的灾难类型\n- **分流**：把灾难分配到不同层级\n- **对位**：让挑战总有承载者与解法\n- **留痕**：把通过与失败刻进世界\n\n---\n\n## 三、修行七阶\n\n| 阶位 | 名称 | 核心 |\n|------|------|------|\n| 一阶 | 点火 | 第一次稳定与灵界接上 |\n| 二阶 |..."]
