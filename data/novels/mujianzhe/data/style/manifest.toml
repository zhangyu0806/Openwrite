narration_rules = ["紧密跟随主角的第三人称有限视角，读者所知即主角所知。\n主角用现代机械工程师/社畜视角解构异世界，内心有大量吐槽和自我推理。\n系统提示以【】形式直接嵌入正文，构成叙事呼吸阀。\n渐进式揭秘：信息通过主角观察、他人对话、系统提示碎片式释放，关键真相延迟满足。", "中文为主，适当融入现代网络用语（\"慌得一批\"、\"摸鱼\"、\"KPI\"等）作为主角内心吐槽语言。\n对飞升时代的构装造物、遗迹技术有\"民族志式的细致\"描写——材质、结构、运作原理都要具体。\n专业术语先抛出陌生名词，再通过主角的机械知识或系统说明逐步解释。\n避免维多利亚翻译腔，但保留对\"旧时代美学\"的敬意。", "网文友好型短段落为主，一个动作、一个念头、一句对话常单独成段。\n紧张-松弛循环：紧张的回响探索/战斗后，必须插入\"战后瘫软时间\"——修车、吃饭、斗嘴、盘点收获。\n信息释放遵循\"表层任务→深层机制→真相任务\"三级跳，让读者始终处于\"即将看透\"的临界状态。\n章末必须留钩子，但不要用\"嘴角微微上扬\"\"深吸一口气\"等陈词滥调。"]
