voice: |
  紧密跟随主角的第三人称有限视角，读者所知即主角所知。
  主角用现代机械工程师/社畜视角解构异世界，内心有大量吐槽和自我推理。
  系统提示以【】形式直接嵌入正文，构成叙事呼吸阀。
  渐进式揭秘：信息通过主角观察、他人对话、系统提示碎片式释放，关键真相延迟满足。

language_style: |
  中文为主，适当融入现代网络用语（"慌得一批"、"摸鱼"、"KPI"等）作为主角内心吐槽语言。
  对飞升时代的构装造物、遗迹技术有"民族志式的细致"描写——材质、结构、运作原理都要具体。
  专业术语先抛出陌生名词，再通过主角的机械知识或系统说明逐步解释。
  避免维多利亚翻译腔，但保留对"旧时代美学"的敬意。

rhythm: |
  网文友好型短段落为主，一个动作、一个念头、一句对话常单独成段。
  紧张-松弛循环：紧张的回响探索/战斗后，必须插入"战后瘫软时间"——修车、吃饭、斗嘴、盘点收获。
  信息释放遵循"表层任务→深层机制→真相任务"三级跳，让读者始终处于"即将看透"的临界状态。
  章末必须留钩子，但不要用"嘴角微微上扬""深吸一口气"等陈词滥调。

dialogue: |
  外部对话根据角色身份区分：归墟职员正式得体、贫民区市井直接、黑市掮客油滑。
  系统"统子"是毒舌吐槽役，与主角形成相声式互动。
  三人小组（沈烬、裴织、燕回/顾衡）对话没有固定吐槽役，职能会流动互换。
  重要设定嵌入对话中自然输出，避免作者直接打断叙事说明。

unique_fingerprints:
  - "系统提示以【】完全正文化，是叙事的一部分而非旁注"
  - "主角的'机械工程师滤镜'：看到任何东西都想拆、想修、想画结构图"
  - "谨慎型主角：行动前超详细利弊分析，行动中被迫冒险，行动后立刻复盘"
  - "'战后瘫软时间'不可省略：战斗后必须修车、吃饭、斗嘴、检查装备"
  - "回响副本=可重玩的历史悲剧：通关意味着还原一段被掩埋的真相"
  - "渐进式侵蚀机制替代死亡：用'灵性污染''入戏程度''时限压力'创造渐进式紧张感"
  - "章标题可适度玩梗或neta，如'安南：在路上了咕.jpg'式的自嘲"
  - "主角可以一本正经地在内心夸奖自己，形成冷幽默"

