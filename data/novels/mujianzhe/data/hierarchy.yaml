  title: 第12节：出戏之时
  arc_id: arc_003
  chapters:
  - ch_089
  - ch_090
  - ch_091
  - ch_092
  - ch_093
  - ch_094
  - ch_095
  - ch_096
  summary: '**核心事件**：

    双线决战。沈烬回归现实，使用【出戏之隙】印让白续"出戏"，打断其被熵灾污染和独角蛊惑的状态，白续醒悟后牺牲自己阻止仪式，独角降临一半，沈烬用假面临时爆种击退独角。

    **关键内容**：

    **本节悬念**：续存派高层是谁？伶舟的"自己的故事"会是什么？

    ---'
- id: sec_013
  title: 第13节：现实余波
  arc_id: arc_004
  chapters:
  - ch_097
  - ch_098
  - ch_099
  - ch_100
  - ch_101
  - ch_102
  - ch_103
  - ch_104
  summary: '**核心事件**：

    战后整理，团队羁绊加深，为第二卷埋下钩子。

    最后一次进入回响，沈烬回去收尾，并且和伶舟告别，伶舟指出，他实际应该不是一个侦探，真实一个神秘的男人，沈烬想解释，但是伶舟把手指放到他唇上，让主角不用解释，然后和他说接下来的计划，然后正式告别，希望之后能再次见面。

    **关键内容**：

    ---'
