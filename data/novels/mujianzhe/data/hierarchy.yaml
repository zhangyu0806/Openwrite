sections:
- id: sec_001
  title: 第1节：灵界异动
  arc_id: arc_001
  chapters:
  - ch_001
  - ch_002
  - ch_003
  - ch_004
  - ch_005
  - ch_006
  - ch_007
  - ch_008
  summary: '**核心事件**：

    沈烬在港口码头区"捡垃圾"时遭遇史核回响失控引发的灵界异动，钥匙手链激活，点燃灵性之火，被归墟吸纳。

    **关键内容**：

    **关键设定**：

    **本节悬念**：谁引爆了回响？手链与飞升时代的关联？

    ---'
- id: sec_002
  title: 第2节：准备期
  arc_id: arc_001
  chapters:
  - ch_009
  - ch_010
  - ch_011
  - ch_012
  - ch_013
  - ch_014
  - ch_015
  - ch_016
  summary: '**核心事件**：

    入职后的准备期，沈烬接受基础训练，同时继续经营工坊，通过黑市筹备装备，为首次进入回响做准备。

    **关键内容**：

    **关键设定**：

    **本节悬念**：白续为何对手链感兴趣？黑市线人提到的"引爆者"是谁？沈烬的准备是否充分？

    ---'
- id: sec_003
  title: 第3节：队友集结
  arc_id: arc_001
  chapters:
  - ch_017
  - ch_018
  - ch_019
  - ch_020
  - ch_021
  - ch_022
  - ch_023
  - ch_024
  summary: '**核心事件**：

    沈烬完成培训，被分配首次外勤任务，与队友正式组队，在任务前建立初步默契。

    **关键内容**：

    **关键设定**：

    **本节悬念**：这个任务会是什么？队友之间能否配合默契？黑市提到的"高价收购者"是谁？

    ---'
- id: sec_004
  title: 第4节：回响初啼
  arc_id: arc_001
  chapters:
  - ch_025
  - ch_026
  - ch_027
  - ch_028
  - ch_029
  - ch_030
  - ch_031
  - ch_032
  summary: '**核心事件**：

    沈烬与队友首次进入「观众席就位」回响，各自获得不同身份，分散在回响中。沈烬以"赴约而来的侦探"身份调查异常，遇见委托调查的伶舟。

    **关键内容**：

    **关键设定**：

    **本节悬念**：人格覆盖的机制是什么？伶舟何时能真正信任沈烬？

    ---'
- id: sec_005
  title: 第5节：万戏遗产
  arc_id: arc_002
  chapters:
  - ch_033
  - ch_034
  - ch_035
  - ch_036
  - ch_037
  - ch_038
  - ch_039
  - ch_040
  summary: '**核心事件**：

    沈烬整合回响中获得的信息，发现港口地下遗迹与回响的物理连接，队友钩子逐步显露。

    **关键内容**：

    **关键设定**：

    **本节悬念**：白续在遗迹中寻找什么？燕回为何对回响如此熟悉？

    ---'
- id: sec_006
  title: 第6节：导览迷局
  arc_id: arc_002
  chapters:
  - ch_041
  - ch_042
  - ch_043
  - ch_044
  - ch_045
  - ch_046
  - ch_047
  - ch_048
  summary: '**核心事件**：

    第二次进入回响，深入仪式核心区，与伶舟建立合作关系，发现"英雄模板覆盖"的真相。

    **关键内容**：

    **关键设定**：

    **本节悬念**：仪式的核心在哪里？如何破坏整个仪式？

    ---'
- id: sec_007
  title: 第7节：承认机制
  arc_id: arc_002
  chapters:
  - ch_049
  - ch_050
  - ch_051
  - ch_052
  - ch_053
  - ch_054
  - ch_055
  - ch_056
  summary: '**核心事件**：

    理解观众承认机制核心，发现白续的异常活动，反派动机浮现。

    **关键内容**：

    **本节悬念**："人格覆盖"是什么？白续想"复活"的到底是谁？

    ---'
- id: sec_008
  title: 第8节：暗流涌动
  arc_id: arc_002
  chapters:
  - ch_057
  - ch_058
