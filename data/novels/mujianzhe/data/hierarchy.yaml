  - ch_064
  summary: '**核心事件**：

    调查深入，发现白续完整计划，老刑旧案钩子浮现。

    **关键内容**：

    **本节悬念**：老刑旧案的完整真相？"种子"已经种下了多少？

    ---'
- id: sec_009
  title: 第9节：角色侵蚀
  arc_id: arc_003
  chapters:
